server:
  port: ${PT_WEB_PORT:8080}

spring:
  application:
    name: pt-web-server
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:postgresql://localhost:5432/pt
          username: ${DB_USER:postgres}
          password: ${DB_PASSWORD:123456}
          driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
