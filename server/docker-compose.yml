# 本地 PostgreSQL + Nginx（bridge + 端口映射，Win/Mac/Linux 均可用）
# 启动: cd server && docker compose up -d
# 访问: http://localhost （nginx 80），pt-web-server 需在本机起 8080
# Windows 若 nginx 启动卡住：多半是绑定挂载 Win 路径导致，可把项目放到 WSL 里再执行 compose
services:
  nginx:
    image: nginx:alpine
    container_name: jpstale-nginx
    user: root
    ports:
      - "80:80"
    volumes:
      - ./www:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: jpstale-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: pt
      TZ: Asia/Shanghai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata: